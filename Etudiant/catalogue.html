<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>École 221 – Catalogue des Formations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        /* accent underline on hero */
        .accent-underline {
            position: relative;
            color: #2A9D8F;
        }

        .accent-underline::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #2A9D8F;
            border-radius: 2px;
            opacity: 0.3;
        }

        /* dot grid background */
        .dot-grid {
            background-image: radial-gradient(circle, #2A9D8F 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }

        /* step connector arrow */
        .step-item:not(:last-child)::after {
            content: '→';
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #2A9D8F;
            opacity: 0.4;
        }

        /* card hover */
        .formation-card {
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.28s;
        }

        .formation-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(42, 157, 143, 0.15);
            border-color: #2A9D8F;
        }

        /* btn hover transitions */
        .btn-hero-main {
            transition: all 0.25s;
        }

        .btn-hero-main:hover {
            background: #1f7a6e;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(42, 157, 143, 0.4);
        }

        .btn-ghost {
            transition: all 0.2s;
        }

        .btn-ghost:hover {
            border-color: #2A9D8F;
            color: #2A9D8F;
            background: #f0faf9;
        }

        .btn-inscrire {
            transition: all 0.2s;
        }

        .btn-inscrire:hover {
            background: #1f7a6e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(42, 157, 143, 0.3);
        }

        .btn-outline-nav {
            transition: all 0.2s;
        }

        .btn-outline-nav:hover {
            background: #e8f6f5;
        }

        .btn-primary-nav {
            transition: all 0.2s;
        }

        .btn-primary-nav:hover {
            background: #1f7a6e;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(42, 157, 143, 0.35);
        }

        .step-card {
            transition: all 0.25s;
        }

        .step-card:hover {
            border-color: #2A9D8F;
            background: #f0faf9;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(42, 157, 143, 0.12);
        }

        .btn-white {
            transition: all 0.2s;
        }

        .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .nav-link {
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #2A9D8F;
        }

        /* hero circle decorations */
        .hero-circle-outer {
            position: absolute;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            width: 520px;
            height: 520px;
            border-radius: 9999px;
            background: linear-gradient(135deg, #e8f6f5 0%, rgba(42, 157, 143, 0.05) 100%);
            border: 1.5px solid #d4ecea;
            pointer-events: none;
        }

        .hero-circle-inner {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 360px;
            height: 360px;
            border-radius: 9999px;
            background: linear-gradient(135deg, rgba(42, 157, 143, 0.12) 0%, transparent 100%);
            pointer-events: none;
        }
    </style>
</head>
